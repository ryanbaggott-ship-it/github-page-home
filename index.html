<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Welcome</title>
    

<style data-gate>body{visibility:hidden;}</style>
<script data-gate>
(function(){
  var slug='5wMHSbywJ';
  var apiBase='https://paymegpt.com';
  var PIN_TOKEN_KEY='lp_pin_'+slug;
  var pinPassed=false;
  var storedToken=localStorage.getItem(PIN_TOKEN_KEY);
  if(storedToken){
    try{
      var decoded=atob(storedToken);
      var parts=decoded.split(':');
      if(parts[0]==='pin'&&parts.length>=4){
        var ts=parseInt(parts[3]);
        if(Date.now()-ts<24*60*60*1000){pinPassed=true;}
      }
    }catch(e){}
  }
  var urlParams=new URLSearchParams(window.location.search);
  var pinToken=urlParams.get('pin_access_token');
  if(pinToken){
    localStorage.setItem(PIN_TOKEN_KEY,pinToken);
    var url=new URL(window.location.href);
    url.searchParams.delete('pin_access_token');
    window.history.replaceState({},'',url.toString());
    pinPassed=true;
  }
  if(pinPassed){document.addEventListener('DOMContentLoaded',function(){document.body.style.visibility='visible';});return;}
  document.addEventListener('DOMContentLoaded',function(){
  var currentMethod='email';
  var currentIdentifier='';
  var gateHtml='<div id="pin-gate" style="position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);display:flex;align-items:center;justify-content:center;z-index:999999;font-family:system-ui,-apple-system,sans-serif;padding:16px;">' +
    '<div style="background:white;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.15);width:100%;max-width:420px;padding:32px;text-align:center;">' +
    '<h2 style="margin:0 0 12px;font-size:24px;font-weight:700;color:#111827;">Identity Verification</h2>' +
    '<p style="margin:0 0 24px;color:#6b7280;font-size:16px;">Please verify your identity to access this page.</p>' +
    '' +
    '<form id="pin-request-form">' +
    '<input type="email" id="pin-identifier" placeholder="Enter your email address" required style="width:100%;box-sizing:border-box;height:48px;padding:0 16px;font-size:16px;border:1px solid #d1d5db;border-radius:8px;outline:none;margin-bottom:12px;" />' +
    '<div id="pin-req-error" style="display:none;color:#ef4444;font-size:14px;margin-bottom:12px;"></div>' +
    '<button type="submit" id="pin-send-btn" style="width:100%;height:48px;font-size:16px;font-weight:600;color:white;border:none;border-radius:8px;cursor:pointer;background:#2563eb;">Send Verification Code</button>' +
    '</form>' +
    '<form id="pin-verify-form" style="display:none;">' +
    '<p id="pin-sent-msg" style="font-size:14px;color:#6b7280;margin-bottom:12px;"></p>' +
    '<input type="text" id="pin-code" placeholder="Enter 6-digit PIN" maxlength="6" style="width:100%;box-sizing:border-box;height:48px;padding:0 16px;font-size:20px;text-align:center;letter-spacing:8px;font-family:monospace;border:1px solid #d1d5db;border-radius:8px;outline:none;margin-bottom:12px;" required />' +
    '<div id="pin-ver-error" style="display:none;color:#ef4444;font-size:14px;margin-bottom:12px;"></div>' +
    '<button type="submit" id="pin-verify-btn" style="width:100%;height:48px;font-size:16px;font-weight:600;color:white;border:none;border-radius:8px;cursor:pointer;background:#2563eb;">Verify PIN</button>' +
    '<button type="button" id="pin-resend-btn" style="width:100%;margin-top:8px;padding:8px;background:none;border:none;color:#6b7280;cursor:pointer;font-size:14px;">Resend PIN</button>' +
    '<button type="button" id="pin-back-btn" style="width:100%;padding:8px;background:none;border:none;color:#9ca3af;cursor:pointer;font-size:14px;">Use different contact</button>' +
    '</form></div></div>';
  document.body.insertAdjacentHTML('beforeend',gateHtml);
  document.body.style.visibility='visible';
  var reqForm=document.getElementById('pin-request-form');
  var verForm=document.getElementById('pin-verify-form');
  var idInput=document.getElementById('pin-identifier');
  var codeInput=document.getElementById('pin-code');
  var sendBtn=document.getElementById('pin-send-btn');
  var verifyBtn=document.getElementById('pin-verify-btn');
  var reqError=document.getElementById('pin-req-error');
  var verError=document.getElementById('pin-ver-error');
  var sentMsg=document.getElementById('pin-sent-msg');
  
  function sendPin(){
    var id=idInput.value.trim();if(!id)return;
    sendBtn.disabled=true;sendBtn.textContent='Sending...';reqError.style.display='none';
    var body=currentMethod==='sms'?{phone:id}:{email:id};
    fetch(apiBase+'/api/landing-pages/public/'+slug+'/generate-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.success){currentIdentifier=id;reqForm.style.display='none';verForm.style.display='block';sentMsg.textContent='We sent a 6-digit PIN to '+id;codeInput.focus();}
      else{reqError.textContent=d.message||'Failed to send PIN';reqError.style.display='block';}
    })
    .catch(function(){reqError.textContent='Failed to send PIN';reqError.style.display='block';})
    .finally(function(){sendBtn.disabled=false;sendBtn.textContent='Send Verification Code';});
  }
  function verifyPin(){
    var pin=codeInput.value.trim();if(!pin||pin.length!==6){verError.textContent='Please enter the 6-digit PIN';verError.style.display='block';return;}
    verifyBtn.disabled=true;verifyBtn.textContent='Verifying...';verError.style.display='none';
    var body=currentMethod==='sms'?{phone:currentIdentifier,pin:pin}:{email:currentIdentifier,pin:pin};
    fetch(apiBase+'/api/landing-pages/public/'+slug+'/verify-pin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.verified){localStorage.setItem(PIN_TOKEN_KEY,d.accessToken);document.getElementById('pin-gate').remove();}
      else{verError.textContent=d.message||'Invalid PIN code';verError.style.display='block';}
    })
    .catch(function(){verError.textContent='Failed to verify PIN';verError.style.display='block';})
    .finally(function(){verifyBtn.disabled=false;verifyBtn.textContent='Verify PIN';});
  }
  reqForm.addEventListener('submit',function(e){e.preventDefault();sendPin();});
  verForm.addEventListener('submit',function(e){e.preventDefault();verifyPin();});
  document.getElementById('pin-resend-btn').addEventListener('click',sendPin);
  document.getElementById('pin-back-btn').addEventListener('click',function(){verForm.style.display='none';reqForm.style.display='block';codeInput.value='';verError.style.display='none';});
  codeInput.addEventListener('input',function(e){e.target.value=e.target.value.replace(/[^0-9]/g,'').slice(0,6);});
  idInput.focus();
  });
})();
</script>  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="grid-bg"></div>
    <nav>
        <a href="https://ryanbaggott-ship-it.github.io/github-page-home/" class="nav-logo">🐙 GitHub</a>
        <ul class="nav-menu">
            <li><a href="https://ryanbaggott-ship-it.github.io/github-page-home/">Home</a></li>
            <li><a href="https://ryanbaggott-ship-it.github.io/github-page-home/contact/">Contact</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
        </ul>
    </nav>
    <div class="container">
        <div>
            <div class="logo">🐙</div>
            <h1>Welcome to GitHub</h1>
            <p>Build, ship, and maintain software</p>
            <a href="#" class="cta-button">Get Started</a>
        </div>
    </div>
</body>
</html>
